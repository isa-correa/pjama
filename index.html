<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PJÄMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:           #0f0a1a;
  --purple:       #7B4FBE;
  --purple-lt:    #B088E8;
  --pink:         #E8557A;
  --pink-lt:      #F4A0B8;
  --cream:        #F5ECD7;
  --glass-bg:     rgba(12, 7, 25, 0.58);
  --glass-border: rgba(245,236,215,0.11);
  --font-hand:    'Caveat', cursive;
  --font-body:    'Playfair Display', serif;
  --font-mono:    'DM Mono', monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  overflow: hidden;
  font-family: var(--font-body);
  position: relative;
}

/* ── VIDEO BACKGROUND ── */
#bg-video {
  position: fixed;
  top: 0; bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  z-index: 0;
  animation: organic-drift 28s ease-in-out infinite alternate;
  transform-origin: center center;
  will-change: transform;
}

@keyframes organic-drift {
  0%   { transform: scale(1.05) translate(0px,    0px)   rotate(0deg);   }
  20%  { transform: scale(1.08) translate(-10px, -8px)   rotate(0.2deg); }
  40%  { transform: scale(1.06) translate(6px,   -10px)  rotate(-0.15deg);}
  60%  { transform: scale(1.09) translate(-5px,   9px)   rotate(0.25deg); }
  80%  { transform: scale(1.07) translate(10px,   3px)   rotate(-0.2deg); }
  100% { transform: scale(1.05) translate(-8px,  -5px)   rotate(0.1deg);  }
}

/* gradient overlay — right side subtle dark for player readability */
#bg-overlay {
  position: fixed;
  inset: 0;
  background:
    linear-gradient(to left,
      rgba(8,4,18,0.72) 0%,
      rgba(8,4,18,0.45) 35%,
      rgba(8,4,18,0.1)  65%,
      rgba(8,4,18,0.0)  100%),
    linear-gradient(to top,
      rgba(8,4,18,0.5)  0%,
      transparent       45%);
  z-index: 1;
  pointer-events: none;
}

/* ── GRAIN ── */
#grain {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── RAIN ── */
#rainCanvas {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  opacity: 0.5;
}

/* ── LAYOUT ── */
.layout {
  position: fixed;
  right: 48px;
  left: auto;
  top: 0;
  bottom: 36px;
  width: min(420px, calc(100vw - 64px));
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  z-index: 10;
  padding: 20px 0;
  animation: fade-in-up 0.9s ease both 0.15s;
}

/* ── LOGO — hidden, lives inside orb now ── */
.logo { display: none; }

/* ── VINYL DISC ── */
.vinyl-wrap {
  position: relative;
  width: 140px;
  height: 140px;
  margin-bottom: 52px;
  align-self: center;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#vinylCanvas {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  transition: transform 0.06s ease-out;
  transform-origin: center center;
}
.vinyl-label {
  position: absolute;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 38%,
    #3a1a5a 0%, #1e0a35 60%, #150720 100%
  );
  border: 1px solid rgba(245,236,215,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2;
  box-shadow: 0 0 12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
  pointer-events: none;
  transition: transform 0.06s ease-out;
  transform-origin: center center;
}
.vinyl-label-text {
  font-family: var(--font-hand);
  font-size: 11px;
  font-weight: 700;
  color: var(--pink-lt);
  line-height: 1;
  letter-spacing: 0;
}
.vinyl-label-text span { color: var(--cream); }
.vinyl-hole {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(245,236,215,0.15);
  margin-top: 3px;
}

/* ── PLAYER CARD ── */
.player-card {
  position: relative;
  width: 100%;
  background: var(--glass-bg);
  backdrop-filter: blur(28px) saturate(1.6);
  -webkit-backdrop-filter: blur(28px) saturate(1.6);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 28px 28px 24px;
  box-shadow:
    0 8px 64px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 0 0 1px rgba(0,0,0,0.25);
}
.player-card::before {
  content: '';
  position: absolute;
  top: 28px; left: 28px; right: 28px;
  height: 150px;
  background: repeating-linear-gradient(
    to bottom, transparent, transparent 27px,
    rgba(180,160,220,0.07) 27px, rgba(180,160,220,0.07) 28px
  );
  pointer-events: none;
}

/* ── TRACK INFO ── */
.track-title {
  font-family: var(--font-body);
  font-size: 22px;
  font-weight: 500;
  color: var(--cream);
  margin-bottom: 2px;
  letter-spacing: -0.02em;
}
.track-artist {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--purple-lt);
  letter-spacing: 0.2em;
  opacity: 0.6;
  margin-bottom: 20px;
}

/* ── LYRICS ── */
.lyrics {
  min-height: 72px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.lyric-line {
  font-family: var(--font-body);
  font-size: 21px;
  font-weight: 500;
  font-style: normal;
  color: var(--cream);
  line-height: 1.45;
  white-space: normal;
  letter-spacing: 0;
  text-shadow: 0 0 16px rgba(232,85,122,0.3);
  animation: lyric-in 0.5s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
@keyframes lyric-in {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── WAVEFORM ── */
.waveform {
  height: 44px;
  display: flex;
  align-items: center;
  gap: 2px;
  cursor: grab;
  user-select: none;
  margin-bottom: 10px;
  overflow: hidden;
  width: 100%;
}
.waveform:active { cursor: grabbing; }
.wave-bar {
  flex-shrink: 0;
  width: 2px;
  border-radius: 1px;
  background: rgba(180,140,220,0.18);
  transition: background 0.12s ease;
}
.wave-bar.played { background: rgba(180,140,220,0.48); }
.wave-bar.head   { background: var(--pink-lt); box-shadow: 0 0 6px rgba(232,85,122,0.6); }

/* ── TIME ── */
.time-row {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 9px;
  color: rgba(245,236,215,0.3);
  letter-spacing: 0.15em;
  margin-bottom: 22px;
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
}
.ctrl-btn {
  background: none; border: none; cursor: pointer;
  opacity: 0.48; transition: opacity 0.2s, transform 0.15s;
  padding: 4px; display: flex; align-items: center;
}
.ctrl-btn:hover  { opacity: 0.9; transform: scale(1.1); }
.ctrl-btn:active { transform: scale(0.95); }

.play-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(245,236,215,0.08);
  border: 1px solid rgba(245,236,215,0.18);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
}
.play-btn:hover  { background: rgba(245,236,215,0.14); box-shadow: 0 0 24px rgba(232,85,122,0.22); transform: scale(1.05); }
.play-btn:active { transform: scale(0.97); }
.play-btn.playing { background: rgba(232,85,122,0.14); border-color: rgba(232,85,122,0.38); box-shadow: 0 0 32px rgba(232,85,122,0.18); }

/* ── TICKER ── */
.ticker {
  position: fixed;
  bottom: 0; left: 0; right: 0; height: 36px;
  background: rgba(8,4,18,0.78);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(180,140,220,0.13);
  overflow: hidden; z-index: 50;
  display: flex; align-items: center;
}
.ticker-track {
  display: flex; white-space: nowrap;
  animation: ticker-scroll 32s linear infinite;
}
.ticker-item {
  font-family: var(--font-mono); font-size: 9px;
  color: rgba(180,140,220,0.48);
  padding: 0 40px; letter-spacing: 0.2em;
  display: flex; align-items: center; gap: 14px;
}
.ticker-dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--pink); opacity: 0.55;
  display: inline-block; flex-shrink: 0;
}

/* ── DECO NOTES ── */
.deco-note {
  position: fixed;
  font-family: var(--font-hand);
  color: rgba(245,236,215,0.1);
  pointer-events: none; z-index: 4;
  transition: transform 0.4s ease-out;
}

/* ── ANIMATIONS ── */
@keyframes ticker-scroll {
  0%   { transform:translateX(0); }
  100% { transform:translateX(-50%); }
}
@keyframes fade-in-up {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>

</div>

<script>
// ─── RAIN ─────────────────────────────────────────────────────────────
const rc = document.getElementById('rainCanvas');
const rctx = rc.getContext('2d');
function resizeRain() { rc.width = innerWidth; rc.height = innerHeight; }
resizeRain();
window.addEventListener('resize', resizeRain);
const DROPS = Array.from({length:130}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight,
  len: 8+Math.random()*14, speed: 3+Math.random()*4, op: 0.04+Math.random()*0.13
}));
(function rainLoop(){
  rctx.clearRect(0,0,rc.width,rc.height);
  DROPS.forEach(d => {
    rctx.beginPath(); rctx.moveTo(d.x,d.y); rctx.lineTo(d.x-1,d.y+d.len);
    rctx.strokeStyle=`rgba(180,160,220,${d.op})`; rctx.lineWidth=0.8; rctx.stroke();
    d.y+=d.speed; d.x-=0.5;
    if(d.y>rc.height+20){ d.y=-20; d.x=Math.random()*rc.width; }
  });
  requestAnimationFrame(rainLoop);
})();

// ─── WEB AUDIO ────────────────────────────────────────────────────────
const audio = document.getElementById('audio');
let audioCtx, analyser, dataArray, audioReady = false;

function initAudio() {
  if (audioReady) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.55; // lower = faster reaction to beats
    // Must set crossOrigin before src is loaded if serving cross-origin
    // Connect source → analyser → output
    const source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    audioReady = true;
  } catch(e) {
    console.warn('Web Audio init failed:', e);
    audioReady = false;
  }
}

let vinylPeak = 0;
let vinylAngle = 0;
let vinylRaf;
let vinylPlaying = false;

// ─── VINYL DISC DRAWING ───────────────────────────────────────────────
const vc    = document.getElementById('vinylCanvas');
const vctx  = vc.getContext('2d');
const VR    = 70; // radius
const VCX   = 70;
const VCY   = 70;

function drawVinyl(angle, energy) {
  vctx.clearRect(0, 0, 140, 140);

  vctx.save();
  vctx.translate(VCX, VCY);
  vctx.rotate(angle);

  // outer disc
  vctx.beginPath();
  vctx.arc(0, 0, VR, 0, Math.PI * 2);
  vctx.fillStyle = '#0d0818';
  vctx.fill();

  // vinyl grooves — concentric rings with slight color variation
  const grooveCount = 18;
  for (let i = 0; i < grooveCount; i++) {
    const r = 28 + i * 2.2;
    const alpha = 0.06 + (i % 3 === 0 ? 0.06 : 0) + energy * 0.08;
    vctx.beginPath();
    vctx.arc(0, 0, r, 0, Math.PI * 2);
    vctx.strokeStyle = `rgba(180,140,220,${alpha})`;
    vctx.lineWidth = 0.6;
    vctx.stroke();
  }

  // highlight shimmer arc — rotates with disc
  const grad = vctx.createLinearGradient(-VR, 0, VR, 0);
  grad.addColorStop(0,    'rgba(255,255,255,0)');
  grad.addColorStop(0.45, `rgba(255,255,255,${0.04 + energy * 0.06})`);
  grad.addColorStop(0.55, `rgba(255,255,255,${0.04 + energy * 0.06})`);
  grad.addColorStop(1,    'rgba(255,255,255,0)');
  vctx.beginPath();
  vctx.arc(0, 0, VR, 0, Math.PI * 2);
  vctx.fillStyle = grad;
  vctx.fill();

  // outer rim
  vctx.beginPath();
  vctx.arc(0, 0, VR - 0.5, 0, Math.PI * 2);
  vctx.strokeStyle = `rgba(245,236,215,${0.08 + energy * 0.12})`;
  vctx.lineWidth = 1;
  vctx.stroke();

  vctx.restore();

  // warm glow under disc reacting to beat
  if (energy > 0.05) {
    const glowGrad = vctx.createRadialGradient(VCX, VCY, 20, VCX, VCY, VR + 20);
    glowGrad.addColorStop(0,   `rgba(232,85,122,${(energy * 0.3).toFixed(2)})`);
    glowGrad.addColorStop(0.6, `rgba(123,79,190,${(energy * 0.15).toFixed(2)})`);
    glowGrad.addColorStop(1,   'rgba(0,0,0,0)');
    vctx.beginPath();
    vctx.arc(VCX, VCY, VR + 20, 0, Math.PI * 2);
    vctx.fillStyle = glowGrad;
    vctx.fill();
  }
}

function vinylLoop() {
  if (audioReady) {
    analyser.getByteFrequencyData(dataArray);
    const bassRaw = dataArray.slice(1, 16).reduce((a,b)=>a+b,0) / 15 / 255;
    if (bassRaw > vinylPeak) vinylPeak = bassRaw;
    else vinylPeak *= 0.88;
  } else {
    vinylPeak *= 0.92;
  }

  const energy = Math.pow(vinylPeak, 0.7);

  // rotate: base speed + wobble on beat
  const baseSpeed = 0.018;
  const wobble    = energy * 0.04;
  vinylAngle += baseSpeed + wobble;

  drawVinyl(vinylAngle, energy);

  // scale the entire vinyl wrap to expand/contract with beat
  const scale = 1 + energy * 0.18;
  vc.style.transform = `scale(${scale.toFixed(3)})`;
  const lbl = document.querySelector('.vinyl-label');
  if (lbl) lbl.style.transform = `scale(${scale.toFixed(3)})`;

  vinylRaf = requestAnimationFrame(vinylLoop);
}

// BPM pulse for fallback when Web Audio not ready
const BPM_MS = (60/95)*1000;
let bpmInterval;
function startBpmPulse() {
  bpmInterval = setInterval(() => { vinylPeak = 0.85; }, BPM_MS);
}
function stopBpmPulse() { clearInterval(bpmInterval); }

function startVinyl() {
  if (!vinylRaf) vinylLoop();
}
function stopVinyl() {
  cancelAnimationFrame(vinylRaf); vinylRaf = null;
  stopBpmPulse();
  drawVinyl(vinylAngle, 0);
}

// draw idle state immediately and start spinning
drawVinyl(0, 0);
vinylLoop(); // always spinning from page load

// ─── WAVEFORM ─────────────────────────────────────────────────────────
const waveform = document.getElementById('waveform');
const BARS = 100;
Array.from({length:BARS}, (_,i) =>
  Math.floor((Math.sin(i*0.28)*0.35+0.5+Math.random()*0.45)*32+6)
).forEach(h => {
  const b = document.createElement('div');
  b.className='wave-bar'; b.style.height=h+'px';
  waveform.appendChild(b);
});
function updateWaveform(pct) {
  const head = Math.floor(pct*BARS);
  waveform.querySelectorAll('.wave-bar').forEach((b,i)=>{
    b.classList.toggle('played', i<=head);
    b.classList.toggle('head',   i===head);
  });
}

// ─── LYRICS ───────────────────────────────────────────────────────────
const LYRICS = [
  "El pijama de teletrabajo",
  "profesional de cintura pa' arriba",
  "la cámara encendida, la cama sin hacer",
  "y los pantalones… opcionales, oh yeah",
  "El pijama de teletrabajo",
  "gato en el regazo, fondo borroso",
  "el desorden detrás que nadie va a ver",
  "y los pantalones… opcionales, oh yeah",
];
const LYRIC_T = [0, 3, 5, 8, 11, 13, 15, 18];
const lyricEl = document.getElementById('lyricActive');
let lastActive = -1;

function updateLyrics(t) {
  let active = 0;
  LYRIC_T.forEach((ts, i) => { if (t >= ts) active = i; });
  if (active === lastActive) return;
  lastActive = active;

  // Swap text and re-trigger animation
  lyricEl.textContent = LYRICS[active];
  lyricEl.style.animation = 'none';
  lyricEl.offsetHeight; // force reflow
  lyricEl.style.animation = '';
}

// ─── PLAYER ───────────────────────────────────────────────────────────
const playBtn   = document.getElementById('playBtn');
const playIcon  = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');

function fmt(s){ return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }

function updateUI() {
  const t   = audio.currentTime;
  const dur = audio.duration || 30;
  document.getElementById('currentTime').textContent = fmt(t);
  document.getElementById('totalTime').textContent   = fmt(dur);
  updateWaveform(t/dur);
  updateLyrics(t);
}

audio.addEventListener('timeupdate', updateUI);
audio.addEventListener('ended', () => {
  playIcon.style.display='block'; pauseIcon.style.display='none';
  playBtn.classList.remove('playing'); stopBpmPulse();
});

async function play() {
  // Init Web Audio on first user gesture (browser requirement)
  initAudio();

  try {
    if (audioCtx && audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }
  } catch(e) {}

  // Play the audio element directly — this is what produces sound
  try {
    await audio.play();
  } catch(e) {
    console.warn('Audio play failed:', e);
    return;
  }

  playIcon.style.display  = 'none';
  pauseIcon.style.display = 'block';
  playBtn.classList.add('playing');

  // BPM fallback pulse if Web Audio not ready
  if (!audioReady) startBpmPulse();
}
function pause() {
  audio.pause();
  playIcon.style.display='block'; pauseIcon.style.display='none';
  playBtn.classList.remove('playing');
  stopBpmPulse();
}

playBtn.addEventListener('click', ()=> audio.paused ? play() : pause());
document.getElementById('prevBtn').addEventListener('click', ()=>{ audio.currentTime=0; updateUI(); });
document.getElementById('nextBtn').addEventListener('click', ()=>{ audio.currentTime=audio.duration||30; pause(); });

// ─── SEEK + DRAG ──────────────────────────────────────────────────────
let dragging=false;
function seekTo(clientX){
  const r=waveform.getBoundingClientRect();
  audio.currentTime=Math.max(0,Math.min(1,(clientX-r.left)/r.width))*(audio.duration||30);
  updateUI();
}
waveform.addEventListener('mousedown',  e=>{ dragging=true; seekTo(e.clientX); e.preventDefault(); });
waveform.addEventListener('touchstart', e=>{ dragging=true; seekTo(e.touches[0].clientX); },{passive:true});
document.addEventListener('mousemove',  e=>{ if(dragging) seekTo(e.clientX); });
document.addEventListener('touchmove',  e=>{ if(dragging) seekTo(e.touches[0].clientX); },{passive:true});
document.addEventListener('mouseup',    ()=> dragging=false);
document.addEventListener('touchend',   ()=> dragging=false);
document.addEventListener('keydown',    e=>{ if(e.code==='Space'){ e.preventDefault(); audio.paused?play():pause(); }});

// ─── TICKER ───────────────────────────────────────────────────────────
const tickerEl=document.getElementById('tickerTrack');
[
  "el pijama de teletrabajo",
  "profesional de cintura pa' arriba",
  "la cámara encendida, la cama sin hacer",
  "y los pantalones… opcionales, oh yeah",
  "gato en el regazo, fondo borroso",
  "el desorden detrás que nadie va a ver",
].concat([
  "el pijama de teletrabajo",
  "profesional de cintura pa' arriba",
  "la cámara encendida, la cama sin hacer",
  "y los pantalones… opcionales, oh yeah",
  "gato en el regazo, fondo borroso",
  "el desorden detrás que nadie va a ver",
]).forEach(t=>{
  const el=document.createElement('div');
  el.className='ticker-item';
  el.innerHTML=`<span class="ticker-dot"></span>${t}`;
  tickerEl.appendChild(el);
});

// ─── PARALLAX NOTES ───────────────────────────────────────────────────
const notes=document.querySelectorAll('.deco-note');
document.addEventListener('mousemove', e=>{
  const mx=(e.clientX/innerWidth-0.5)*2, my=(e.clientY/innerHeight-0.5)*2;
  notes.forEach((n,i)=>{
    const d=(i+1)*7, base=[-8,5,-3][i];
    n.style.transform=`translate(${mx*d}px,${my*d}px) rotate(${base}deg)`;
  });
});

// ─── INIT ─────────────────────────────────────────────────────────────
updateUI();
</script>
</body>
</html>
